name: Cleanup Old News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove news older than 7 days
        run: |
          cutoff=$(date -u -d '3 days ago' +%Y-%m-%d)
          deleted=false
          for file in src/data/news/*/*.json; do
            filename=$(basename "$file" .json)
            if [[ "$filename" < "$cutoff" || "$filename" == "$cutoff" ]]; then
              echo "Removing $file"
              rm "$file"
              deleted=true
            fi
          done
          echo "deleted=$deleted" >> "$GITHUB_ENV"

      - name: Commit and push if changed
        if: env.deleted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news/
          git diff --staged --quiet || (git commit -m "Cleanup news older than 3 days" && git pull --rebase && git push)
